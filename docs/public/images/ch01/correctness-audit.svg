<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">正确性审查流程图</title>
  <desc id="desc">从问题规格和预测锁开始，经由反例、不变式和测试，最终形成推理收据。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#465465"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}
      .panel{fill:#ffffff;stroke:#263447;stroke-width:2;rx:8}
      .spec{fill:#dceeff}
      .predict{fill:#e3f7e8}
      .counter{fill:#fff0cc}
      .proof{fill:#ffe1d8}
      .receipt{fill:#e9e4ff}
      .title{font:700 24px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#102033}
      .text{font:18px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#384758}
      .small{font:16px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#536273}
      .arrow{stroke:#465465;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .loop{stroke:#b75b37;stroke-width:3.5;fill:none;stroke-dasharray:9 8;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect class="bg" width="1200" height="650"/>

  <rect x="60" y="80" width="190" height="132" class="panel spec"/>
  <text x="155" y="120" text-anchor="middle" class="title">规格</text>
  <text x="155" y="154" text-anchor="middle" class="text">输入 / 输出</text>
  <text x="155" y="184" text-anchor="middle" class="small">边界约定</text>

  <rect x="300" y="80" width="190" height="132" class="panel predict"/>
  <text x="395" y="120" text-anchor="middle" class="title">预测锁</text>
  <text x="395" y="154" text-anchor="middle" class="text">先写判断</text>
  <text x="395" y="184" text-anchor="middle" class="small">再看 AI</text>

  <rect x="540" y="80" width="190" height="132" class="panel counter"/>
  <text x="635" y="120" text-anchor="middle" class="title">反例</text>
  <text x="635" y="154" text-anchor="middle" class="text">找最小失败输入</text>
  <text x="635" y="184" text-anchor="middle" class="small">证明它错</text>

  <rect x="780" y="80" width="190" height="132" class="panel proof"/>
  <text x="875" y="120" text-anchor="middle" class="title">不变式</text>
  <text x="875" y="154" text-anchor="middle" class="text">初始化 / 保持</text>
  <text x="875" y="184" text-anchor="middle" class="small">终止推出结果</text>

  <rect x="1010" y="80" width="130" height="132" class="panel receipt"/>
  <text x="1075" y="120" text-anchor="middle" class="title">收据</text>
  <text x="1075" y="154" text-anchor="middle" class="text">接受</text>
  <text x="1075" y="184" text-anchor="middle" class="small">修改 / 拒绝</text>

  <path class="arrow" d="M250 146H300"/>
  <path class="arrow" d="M490 146H540"/>
  <path class="arrow" d="M730 146H780"/>
  <path class="arrow" d="M970 146H1010"/>

  <rect x="185" y="330" width="250" height="126" class="panel"/>
  <text x="310" y="370" text-anchor="middle" class="title">测试</text>
  <text x="310" y="404" text-anchor="middle" class="text">验证若干输入</text>
  <text x="310" y="432" text-anchor="middle" class="small">发现具体问题</text>

  <rect x="475" y="330" width="250" height="126" class="panel"/>
  <text x="600" y="370" text-anchor="middle" class="title">AI 审查助手</text>
  <text x="600" y="404" text-anchor="middle" class="text">生成边界用例</text>
  <text x="600" y="432" text-anchor="middle" class="small">草拟证明和测试</text>

  <rect x="765" y="330" width="250" height="126" class="panel"/>
  <text x="890" y="370" text-anchor="middle" class="title">人的判断</text>
  <text x="890" y="404" text-anchor="middle" class="text">决定规格和取舍</text>
  <text x="890" y="432" text-anchor="middle" class="small">承担最终责任</text>

  <path class="arrow" d="M635 212C635 270 310 270 310 330"/>
  <path class="arrow" d="M875 212C875 270 890 270 890 330"/>
  <path class="arrow" d="M435 393H475"/>
  <path class="arrow" d="M725 393H765"/>

  <path class="loop" d="M1075 212C1065 560 150 560 155 212"/>
  <text x="600" y="548" text-anchor="middle" class="title" fill="#b75b37">发现规格错或反例失败时，回到更早步骤重审</text>
</svg>
