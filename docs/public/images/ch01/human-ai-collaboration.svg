<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">人与 AI 协作边界图</title>
  <desc id="desc">人负责问题定义、约束取舍和最终审查，AI 扩展候选方案并协助实现。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#516170"/>
    </marker>
    <style>
      .bg{fill:#f7f9fc}.panel{fill:#fff;stroke:#263447;stroke-width:2;rx:8}.human{fill:#d9ecff}.ai{fill:#dff6e7}.receipt{fill:#fff1cc;stroke:#263447;stroke-width:2;rx:8}.title{font:700 30px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#102033}.label{font:700 22px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#102033}.text{font:18px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#394858}.arrow{stroke:#516170;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1200" height="620"/>
  <rect x="70" y="90" width="330" height="410" class="panel"/>
  <rect x="70" y="90" width="330" height="70" class="human" rx="8"/>
  <text x="235" y="135" text-anchor="middle" class="title">人的责任</text>
  <text x="235" y="210" text-anchor="middle" class="label">定义真实问题</text>
  <text x="235" y="255" text-anchor="middle" class="label">判断约束取舍</text>
  <text x="235" y="300" text-anchor="middle" class="label">选择建模方式</text>
  <text x="235" y="345" text-anchor="middle" class="label">审查正确性</text>
  <text x="235" y="390" text-anchor="middle" class="label">承担最终决策</text>

  <rect x="800" y="90" width="330" height="410" class="panel"/>
  <rect x="800" y="90" width="330" height="70" class="ai" rx="8"/>
  <text x="965" y="135" text-anchor="middle" class="title">AI 可协助</text>
  <text x="965" y="210" text-anchor="middle" class="label">提出澄清问题</text>
  <text x="965" y="255" text-anchor="middle" class="label">扩展候选方案</text>
  <text x="965" y="300" text-anchor="middle" class="label">生成实现代码</text>
  <text x="965" y="345" text-anchor="middle" class="label">寻找反例测试</text>
  <text x="965" y="390" text-anchor="middle" class="label">总结参考材料</text>

  <rect x="465" y="210" width="270" height="180" class="receipt"/>
  <text x="600" y="270" text-anchor="middle" class="title">推理收据</text>
  <text x="600" y="315" text-anchor="middle" class="text">记录预测、差异</text>
  <text x="600" y="348" text-anchor="middle" class="text">采纳理由和风险</text>

  <path class="arrow" d="M400 290H465"/>
  <path class="arrow" d="M735 290H800"/>
  <path class="arrow" d="M800 335C725 470 475 470 400 335"/>
  <text x="600" y="535" text-anchor="middle" class="label">代码生成变便宜，判断错误变更贵</text>
</svg>
