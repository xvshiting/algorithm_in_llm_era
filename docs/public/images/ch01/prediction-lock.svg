<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">预测锁流程图</title>
  <desc id="desc">先独立判断，再比较 AI 输出，最后反思差异。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#516170"/>
    </marker>
    <style>
      .bg{fill:#f7f9fc}.card{fill:#fff;stroke:#263447;stroke-width:2;rx:8}.head{font:700 30px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#102033}.text{font:20px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#394858}.arrow{stroke:#516170;stroke-width:4;fill:none;marker-end:url(#arrow)}.badge{font:700 18px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#fff}
    </style>
  </defs>
  <rect class="bg" width="1200" height="620"/>
  <rect x="80" y="115" width="300" height="350" class="card"/>
  <rect x="80" y="115" width="300" height="64" fill="#2364aa" rx="8"/>
  <text x="230" y="156" text-anchor="middle" class="badge">第一步</text>
  <text x="230" y="226" text-anchor="middle" class="head">独立判断</text>
  <text x="230" y="270" text-anchor="middle" class="text">写问题规格</text>
  <text x="230" y="305" text-anchor="middle" class="text">写基线解法</text>
  <text x="230" y="340" text-anchor="middle" class="text">预测复杂度</text>
  <text x="230" y="375" text-anchor="middle" class="text">封存时间</text>

  <rect x="450" y="115" width="300" height="350" class="card"/>
  <rect x="450" y="115" width="300" height="64" fill="#2a8c5a" rx="8"/>
  <text x="600" y="156" text-anchor="middle" class="badge">第二步</text>
  <text x="600" y="226" text-anchor="middle" class="head">引入 AI</text>
  <text x="600" y="270" text-anchor="middle" class="text">列候选方案</text>
  <text x="600" y="305" text-anchor="middle" class="text">解释复杂度</text>
  <text x="600" y="340" text-anchor="middle" class="text">给出反例</text>
  <text x="600" y="375" text-anchor="middle" class="text">补充边界</text>

  <rect x="820" y="115" width="300" height="350" class="card"/>
  <rect x="820" y="115" width="300" height="64" fill="#c45a32" rx="8"/>
  <text x="970" y="156" text-anchor="middle" class="badge">第三步</text>
  <text x="970" y="226" text-anchor="middle" class="head">差异反思</text>
  <text x="970" y="270" text-anchor="middle" class="text">哪里想错了</text>
  <text x="970" y="305" text-anchor="middle" class="text">哪里被补充了</text>
  <text x="970" y="340" text-anchor="middle" class="text">最终采纳什么</text>
  <text x="970" y="375" text-anchor="middle" class="text">留下推理收据</text>

  <path class="arrow" d="M380 290H440"/>
  <path class="arrow" d="M750 290H810"/>
  <text x="600" y="520" text-anchor="middle" class="text">目标不是比 AI 更快，而是知道自己为什么改变判断</text>
</svg>
