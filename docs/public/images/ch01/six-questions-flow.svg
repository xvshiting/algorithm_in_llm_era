<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">六问诊断法流程图</title>
  <desc id="desc">六个问题从问题规格到边界说明形成闭环，中间产出推理收据。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#506070"/>
    </marker>
    <style>
      .bg{fill:#f7f9fc}.node{stroke:#263447;stroke-width:2;rx:8}.label{font:700 26px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#102033}.small{font:18px system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#394858}.arrow{fill:none;stroke:#506070;stroke-width:3;marker-end:url(#arrow)}.center{fill:#ffffff;stroke:#263447;stroke-width:2;rx:8}
    </style>
  </defs>
  <rect class="bg" width="1200" height="620"/>
  <rect x="450" y="245" width="300" height="130" class="center"/>
  <text x="600" y="298" text-anchor="middle" class="label">推理收据</text>
  <text x="600" y="332" text-anchor="middle" class="small">记录判断、证据和风险</text>

  <rect x="110" y="80" width="230" height="94" fill="#d9ecff" class="node"/>
  <text x="225" y="120" text-anchor="middle" class="label">1 理解问题</text>
  <text x="225" y="150" text-anchor="middle" class="small">问题规格</text>

  <rect x="485" y="48" width="230" height="94" fill="#dff6e7" class="node"/>
  <text x="600" y="88" text-anchor="middle" class="label">2 建立基线</text>
  <text x="600" y="118" text-anchor="middle" class="small">暴力解 + 预算</text>

  <rect x="860" y="80" width="230" height="94" fill="#fff1cc" class="node"/>
  <text x="975" y="120" text-anchor="middle" class="label">3 检索知识</text>
  <text x="975" y="150" text-anchor="middle" class="small">类型假设</text>

  <rect x="860" y="446" width="230" height="94" fill="#ffe2d7" class="node"/>
  <text x="975" y="486" text-anchor="middle" class="label">4 利用结构</text>
  <text x="975" y="516" text-anchor="middle" class="small">特殊条件</text>

  <rect x="485" y="478" width="230" height="94" fill="#e8e3ff" class="node"/>
  <text x="600" y="518" text-anchor="middle" class="label">5 选择范式</text>
  <text x="600" y="548" text-anchor="middle" class="small">选择理由</text>

  <rect x="110" y="446" width="230" height="94" fill="#e8eef3" class="node"/>
  <text x="225" y="486" text-anchor="middle" class="label">6 承认边界</text>
  <text x="225" y="516" text-anchor="middle" class="small">风险与下一步</text>

  <path class="arrow" d="M340 122 C405 82 425 76 485 88"/>
  <path class="arrow" d="M715 88 C775 76 795 82 860 122"/>
  <path class="arrow" d="M982 174 C1056 260 1056 360 982 446"/>
  <path class="arrow" d="M860 492 C795 532 775 538 715 526"/>
  <path class="arrow" d="M485 526 C425 538 405 532 340 492"/>
  <path class="arrow" d="M218 446 C144 360 144 260 218 174"/>

  <path d="M350 180 C460 232 740 232 850 180" fill="none" stroke="#9aa7b4" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="600" y="214" text-anchor="middle" class="small">每一步都留下可审查的判断</text>
</svg>
