<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">数据结构选择地图</title>
  <desc id="desc">从操作需求出发，选择数组、集合、字典、队列、优先队列或有序结构。</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 10; }
      .core { fill: #ecfeff; stroke: #0891b2; stroke-width: 3; rx: 14; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; font-size: 20px; font-weight: 650; }
      .small { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; font-size: 15px; }
      .arrow { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#64748b" />
    </marker>
  </defs>
  <rect class="bg" width="960" height="520" />
  <rect class="core" x="340" y="32" width="280" height="84" />
  <text class="text" x="480" y="68" text-anchor="middle">操作需求</text>
  <text class="small" x="480" y="94" text-anchor="middle">频率、规模、顺序、约束</text>

  <rect class="box" x="58" y="180" width="190" height="96" />
  <text class="text" x="153" y="216" text-anchor="middle">按下标访问</text>
  <text class="small" x="153" y="244" text-anchor="middle">数组 / list</text>

  <rect class="box" x="282" y="180" width="190" height="96" />
  <text class="text" x="377" y="216" text-anchor="middle">判断是否存在</text>
  <text class="small" x="377" y="244" text-anchor="middle">set / dict</text>

  <rect class="box" x="506" y="180" width="190" height="96" />
  <text class="text" x="601" y="216" text-anchor="middle">按顺序处理</text>
  <text class="small" x="601" y="244" text-anchor="middle">stack / queue</text>

  <rect class="box" x="730" y="180" width="190" height="96" />
  <text class="text" x="825" y="216" text-anchor="middle">反复取最值</text>
  <text class="small" x="825" y="244" text-anchor="middle">heap / priority queue</text>

  <rect class="box" x="170" y="352" width="220" height="96" />
  <text class="text" x="280" y="388" text-anchor="middle">范围和排序</text>
  <text class="small" x="280" y="416" text-anchor="middle">有序列表 / 树 / 索引</text>

  <rect class="box" x="570" y="352" width="220" height="96" />
  <text class="text" x="680" y="388" text-anchor="middle">一串操作总成本</text>
  <text class="small" x="680" y="416" text-anchor="middle">摊还分析</text>

  <path class="arrow" d="M390 116 C270 130, 180 145, 154 180" />
  <path class="arrow" d="M440 116 C410 145, 390 152, 378 180" />
  <path class="arrow" d="M520 116 C555 145, 590 152, 602 180" />
  <path class="arrow" d="M580 116 C710 132, 804 145, 824 180" />
  <path class="arrow" d="M430 116 C326 210, 292 290, 282 352" />
  <path class="arrow" d="M530 116 C638 210, 672 290, 680 352" />
</svg>
