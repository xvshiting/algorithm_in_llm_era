<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">操作契约与具体实现</title>
  <desc id="desc">抽象数据类型先定义操作，底层可以由列表、哈希表或树实现。</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 10; }
      .adt { fill: #eff6ff; stroke: #2563eb; stroke-width: 3; rx: 14; }
      .impl { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 10; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; font-size: 22px; font-weight: 700; }
      .small { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; font-size: 16px; }
      .code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; fill: #334155; font-size: 15px; }
      .arrow { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#64748b" />
    </marker>
  </defs>
  <rect class="bg" width="960" height="420" />
  <rect class="adt" x="270" y="36" width="420" height="136" />
  <text class="text" x="480" y="74" text-anchor="middle">抽象数据类型：集合</text>
  <text class="code" x="332" y="110">add(x)</text>
  <text class="code" x="442" y="110">contains(x)</text>
  <text class="code" x="586" y="110">remove(x)</text>
  <text class="small" x="480" y="146" text-anchor="middle">先规定能做什么，不急着规定怎么存</text>

  <rect class="impl" x="80" y="260" width="220" height="94" />
  <text class="text" x="190" y="296" text-anchor="middle">无序列表</text>
  <text class="small" x="190" y="326" text-anchor="middle">简单，查询 Θ(n)</text>

  <rect class="impl" x="370" y="260" width="220" height="94" />
  <text class="text" x="480" y="296" text-anchor="middle">哈希表</text>
  <text class="small" x="480" y="326" text-anchor="middle">期望快速查询</text>

  <rect class="impl" x="660" y="260" width="220" height="94" />
  <text class="text" x="770" y="296" text-anchor="middle">有序结构</text>
  <text class="small" x="770" y="326" text-anchor="middle">支持范围和顺序</text>

  <path class="arrow" d="M382 172 C300 210, 230 230, 194 260" />
  <path class="arrow" d="M480 172 L480 260" />
  <path class="arrow" d="M578 172 C660 210, 730 230, 766 260" />
</svg>
